    <style>
      :root {
        --bg: #eaf1fb;
        --panel: #f8fbffd6;
        --ink: #0f1c2b;
        --muted: #5a6878;
        --accent: #1080c3;
        --accent-soft: #d8ebff;
        --line: #d5e3f4;

      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background:

          radial-gradient(circle at 92% -4%, #d7f9ee 0, transparent 24%),

      .wrap { max-width: 1120px; margin: 0 auto; padding: 28px 18px 56px; }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: linear-gradient(180deg, #ffffff, #f7fbff);
        border: 1px solid var(--line);
        box-shadow: 0 10px 30px rgba(12, 40, 80, 0.12);
        font-weight: 900;
        letter-spacing: 0.02em;
        color: #102b43;
        flex: 0 0 auto;
      }
      .titles { display: flex; flex-direction: column; gap: 4px; }
      h1 { margin: 0; font-size: 30px; line-height: 1.08; letter-spacing: 0.01em; }
      .sub {
        color: var(--muted);
        font-size: 14px;
        font-weight: 600;
        line-height: 1.2;
      }
      .actions { display: flex; align-items: center; gap: 10px; }
      select {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 10px 14px;
        font: inherit;
        background: #ffffffcc;
        box-shadow: 0 6px 20px rgba(8, 20, 40, 0.08);
      }
      .hero {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 20px;
        box-shadow:
          inset 0 1px 0 #ffffffa6,
          0 20px 46px rgba(11, 39, 75, 0.16);
        backdrop-filter: blur(18px) saturate(150%);
      }
      .hero-grid {
        display: grid;
        grid-template-columns: 1.15fr 1fr;
        gap: 14px;
        align-items: start;
      }
      .chips {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .chip {
        font-size: 12px;
        font-weight: 900;
        color: #18578f;
        background: var(--accent-soft);
        border: 1px solid #bfddf7;
        border-radius: 999px;
        padding: 6px 10px;
      }
      .lead {
        color: var(--muted);
        line-height: 1.7;
        font-size: 14px;
        margin-top: 8px;
      }
      .cta-row {
        margin-top: 14px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border-radius: 12px;
        border: 1px solid transparent;
        padding: 11px 14px;
        font-weight: 900;
        text-decoration: none;
        cursor: pointer;
        user-select: none;
      }
      .btn.primary {
        background: linear-gradient(135deg, #0c6ea8, #0f87b7);
        color: white;
      }
      .btn.ghost {
        background: #ffffff;
        color: var(--accent);
        border-color: #bfddf7;
      }
      .cards {
        margin-top: 14px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }
      .card {
        background: #ffffffd9;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 12px 30px rgba(12, 40, 80, 0.08);
      }
      .card .k {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: #18578f;
        background: var(--accent-soft);
        border: 1px solid #bfddf7;
        border-radius: 999px;
        padding: 6px 10px;
      }
      .k.soon {
        color: #6a6a6a;
        background: #f3f3f3;
        border-color: #e1e1e1;
