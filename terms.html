<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>使用條款 | PVRM</title>
    <meta
      name="description"
      content="Plate.hk 使用條款：香港車牌拍賣結果搜尋服務之資料來源、使用限制與免責說明。"
    />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <link rel="canonical" href="https://plate.hk/terms.html" />
    <meta property="og:type" content="article" />
    <meta property="og:title" content="使用條款 | Plate.hk" />
    <meta property="og:description" content="查看 Plate.hk 的服務使用條款與免責聲明。" />
    <meta property="og:url" content="https://plate.hk/terms.html" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+HK:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg:#eaf1fb;
        --card:#f8fbffd6;
        --line:#d5e3f4;
        --ink:#0f1c2b;
        --muted:#5a6878;
        --accent:#1080c3;
      }
      * { box-sizing:border-box; }
      body {
        margin:0;
        font-family:"Space Grotesk","Noto Sans HK",sans-serif;
        color:var(--ink);
        background:
          radial-gradient(circle at 12% 8%, #d6f3ff 0, transparent 30%),
          radial-gradient(circle at 92% -4%, #d7f9ee 0, transparent 24%),
          radial-gradient(circle at 82% 86%, #dde7ff 0, transparent 26%),
          linear-gradient(180deg, #f4f9ff 0%, var(--bg) 100%);
      }
      .wrap { max-width:1020px; margin:0 auto; padding:28px 18px 46px; }
      .top { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
      .top a {
        border:1px solid var(--line);
        background:#ffffffcc;
        border-radius:999px;
        padding:8px 14px;
        text-decoration:none;
        box-shadow:0 6px 20px rgba(8,20,40,.08);
      }
      .card {
        margin-top:16px;
        background:var(--card);
        border:1px solid var(--line);
        border-radius:18px;
        padding:22px;
        box-shadow:
          inset 0 1px 0 #ffffffa6,
          0 20px 46px rgba(11, 39, 75, 0.16);
        backdrop-filter: blur(18px) saturate(150%);
      }
      h1 { margin:0; font-size:32px; letter-spacing:-0.01em; }
      p { line-height:1.7; margin:10px 0; }
      .meta { color:var(--muted); margin-top:6px; }
      a { color:var(--accent); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <a id="backLink" href="./index.html">&larr; 返回首頁</a>
      </div>
      <div class="card">
        <h1 id="title"></h1>
        <div class="meta" id="updated"></div>
        <div id="content"></div>
      </div>
    </div>

    <script>
      const I18N = {
        zh: {
          pageTitle: "使用條款 | PVRM",
          title: "使用條款",
          back: "← 返回首頁",
          updated: "最後更新：2026年2月28日",
          html: `
            <p>本網站提供自訂車輛登記號碼（Personalized Vehicle Registration Marks）拍賣結果搜尋服務，資料來源為運輸署公開資訊，僅供一般參考用途。</p>
            <p>本網站會盡力保持資料準確與更新，但不保證資料在任何時間均完整、無誤或可用。任何差異或爭議，應以運輸署官方網站及原始 PDF 公布結果為準。</p>
            <p>本網站可能定期重新解析或更正歷史資料，並不代表官方改動；若需要法定或交易用途，請務必以官方公告為準。</p>
            <p>為提高搜尋一致性，查詢輸入可能在瀏覽器端進行正規化處理（例如轉為大寫、移除空白、字元 I/O 對應 1/0）。</p>
            <p>本網站可能使用瀏覽器快取與離線機制提升效能；如你在資料更新後仍看到舊結果，可重新整理頁面，最終仍以運輸署原始 PDF 與官方公布為準。</p>
            <p>你同意不以自動化方式大量抓取、干擾服務運作、或將本網站資料用於非法用途。</p>
            <p>本網站可能連結至第三方網站（如運輸署、Google）。第三方網站的內容與私隱處理不受本網站控制。</p>
            <p>本網站可在不另行通知下更新功能、內容、使用條款及私隱政策。</p>
          `,
        },
        en: {
          pageTitle: "Terms of Use | PVRM",
          title: "Terms of Use",
          back: "← Back to Home",
          updated: "Last updated: 28 Feb 2026",
          html: `
            <p>This site provides search access to Personalized Vehicle Registration Marks auction results from publicly available Transport Department sources, for general reference only.</p>
            <p>While reasonable effort is made to keep data accurate and updated, no warranty is made that information is always complete, error-free, or available. In case of discrepancy, the official Transport Department website and original PDF results prevail.</p>
            <p>Historical data may be re-parsed or corrected from time to time and does not imply official changes; for legal or transactional use, always rely on official publications.</p>
            <p>For consistency, query input may be normalized in-browser (for example uppercase conversion, space removal, and I/O to 1/0 mapping).</p>
            <p>This site may use browser caching/offline mechanisms for performance. If stale data appears after an update, refresh the page; official Transport Department publications and source PDFs always prevail.</p>
            <p>You agree not to use automated bulk scraping, disrupt service operation, or use this site for unlawful purposes.</p>
            <p>This site may link to third-party websites (such as the Transport Department and Google). Their content and privacy practices are outside this site's control.</p>
            <p>This site may update features, content, these terms, and its privacy policy without prior notice.</p>
          `,
        },
      };

      const params = new URLSearchParams(location.search);
      let lang = params.get("lang") === "en" ? "en" : "zh";
      const titleEl = document.getElementById("title");
      const updatedEl = document.getElementById("updated");
      const contentEl = document.getElementById("content");
      const backLinkEl = document.getElementById("backLink");

      function render() {
        const t = I18N[lang];
        document.documentElement.lang = lang === "en" ? "en" : "zh-HK";
        document.title = t.pageTitle;
        titleEl.textContent = t.title;
        updatedEl.textContent = t.updated;
        contentEl.innerHTML = t.html;
        backLinkEl.textContent = t.back;
        backLinkEl.href = `./index.html?lang=${lang}`;
      }

      render();
    </script>
  </body>
</html>
