name: Security

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  security-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime and security tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pip-audit

      - name: Scan tracked files for secrets
        run: python scripts/scan_repo_secrets.py

      - name: Audit Python dependencies
        run: python -m pip_audit -r requirements.txt --progress-spinner=off

      - name: Run local verification suite
        env:
          CHECK_SECURITY_SKIP_DEPS: "1"
        run: ./scripts/check_site.sh
