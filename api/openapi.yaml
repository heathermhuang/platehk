openapi: 3.0.3
info:
  title: Hong Kong VRM Auction Data API
  version: v1
  description: |
    Static Open Data API for Hong Kong vehicle registration mark auction results.
    Data sources are Transport Department published PDF handouts and a bundled legacy TVRM workbook.
servers:
  - url: https://<your-domain>
paths:
  /api/oauth/token:
    post:
      summary: Issue machine bearer tokens for protected OCR access
      description: |
        OAuth 2.0 token endpoint for agent clients.
        Supports the `client_credentials` grant with `client_secret_basic` or `client_secret_post`.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type]
              properties:
                grant_type:
                  type: string
                  enum: [client_credentials]
                scope:
                  type: string
                  example: "vision:ocr"
                client_id:
                  type: string
                client_secret:
                  type: string
      responses:
        "200":
          description: Bearer token issued
        "400":
          description: Invalid request, unsupported grant, or invalid scope
        "401":
          description: Invalid client authentication
  /api/v1/index.json:
    get:
      summary: API entrypoint
      responses:
        "200":
          description: OK
  /api/v1/{dataset}/issues.manifest.json:
    get:
      summary: List issues (auction dates) and shard file paths
      parameters:
        - in: path
          name: dataset
          required: true
          schema:
            type: string
            enum: [pvrm, tvrm_physical, tvrm_eauction, tvrm_legacy]
      responses:
        "200":
          description: OK
  /api/v1/{dataset}/auctions.json:
    get:
      summary: Per-issue metadata (PDF URLs, proceeds, errors)
      parameters:
        - in: path
          name: dataset
          required: true
          schema:
            type: string
            enum: [pvrm, tvrm_physical, tvrm_eauction, tvrm_legacy]
      responses:
        "200":
          description: OK
  /api/v1/{dataset}/results.slim.json:
    get:
      summary: Full dataset as a flat array (large)
      parameters:
        - in: path
          name: dataset
          required: true
          schema:
            type: string
            enum: [pvrm, tvrm_physical, tvrm_eauction, tvrm_legacy]
      responses:
        "200":
          description: OK
  /api/v1/{dataset}/preset.amount_desc.top1000.json:
    get:
      summary: Convenience preset (top 1000 by amount desc)
      parameters:
        - in: path
          name: dataset
          required: true
          schema:
            type: string
            enum: [pvrm, tvrm_physical, tvrm_eauction, tvrm_legacy]
      responses:
        "200":
          description: OK
  /api/v1/{dataset}/issues/{auction_date}.json:
    get:
      summary: Issue shard (all rows for one issue)
      parameters:
        - in: path
          name: dataset
          required: true
          schema:
            type: string
            enum: [pvrm, tvrm_physical, tvrm_eauction, tvrm_legacy]
        - in: path
          name: auction_date
          required: true
          schema:
            type: string
            example: "2026-01-17"
      responses:
        "200":
          description: OK
  /api/vision_plate:
    post:
      summary: OCR a cropped Hong Kong plate image
      description: |
        Protected OCR endpoint.
        Browser clients can continue using the same-origin `vision_session` flow, while machine clients can send a bearer token with the `vision:ocr` scope.
      security:
        - BearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image_data_url]
              properties:
                image_data_url:
                  type: string
                  format: uri
                lang:
                  type: string
                  enum: [zh, en]
                vision_token:
                  type: string
                  description: Browser-only same-origin session token.
      responses:
        "200":
          description: OCR result
        "403":
          description: Missing or invalid authorization
components:
  securitySchemes:
    BearerToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
