<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>更新日誌 | PVRM</title>
    <meta
      name="description"
      content="Plate.hk 更新日誌：香港車牌拍賣搜尋網站的資料更新、修復與功能變更記錄。"
    />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <link rel="canonical" href="https://plate.hk/changelog.html" />
    <meta property="og:type" content="article" />
    <meta property="og:title" content="更新日誌 | Plate.hk" />
    <meta property="og:description" content="查看 Plate.hk 的資料更新與功能修復記錄。" />
    <meta property="og:url" content="https://plate.hk/changelog.html" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+HK:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root { --bg:#eaf1fb; --card:#f8fbffd6; --line:#d5e3f4; --ink:#0f1c2b; --muted:#5a6878; --accent:#1080c3; }
      * { box-sizing:border-box; }
      body {
        margin:0;
        font-family:"Space Grotesk","Noto Sans HK",sans-serif;
        color:var(--ink);
        background:
          radial-gradient(circle at 12% 8%, #d6f3ff 0, transparent 30%),
          radial-gradient(circle at 92% -4%, #d7f9ee 0, transparent 24%),
          radial-gradient(circle at 82% 86%, #dde7ff 0, transparent 26%),
          linear-gradient(180deg, #f4f9ff 0%, var(--bg) 100%);
      }
      .wrap { max-width:1020px; margin:0 auto; padding:28px 18px 46px; }
      .top { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
      .top a {
        border:1px solid var(--line);
        background:#ffffffcc;
        border-radius:999px;
        padding:8px 14px;
        text-decoration:none;
        box-shadow:0 6px 20px rgba(8,20,40,.08);
      }
      .card {
        margin-top:16px;
        background:var(--card);
        border:1px solid var(--line);
        border-radius:18px;
        padding:22px;
        box-shadow:
          inset 0 1px 0 #ffffffa6,
          0 20px 46px rgba(11, 39, 75, 0.16);
        backdrop-filter: blur(18px) saturate(150%);
      }
      h1 { margin:0; font-size:32px; letter-spacing:-0.01em; }
      .meta { color:var(--muted); margin-top:6px; }
      .entry { border-top:1px dashed var(--line); padding-top:12px; margin-top:12px; }
      .entry:first-child { border-top:0; padding-top:0; margin-top:8px; }
      .entry h3 { margin:0; font-size:19px; }
      .entry p { margin:8px 0 0; line-height:1.7; }
      ul { margin:8px 0 0 18px; }
      a { color:var(--accent); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <a id="backLink" href="./index.html">&larr; 返回首頁</a>
      </div>
      <div class="card">
        <h1 id="title"></h1>
        <div class="meta" id="updated"></div>
        <div id="entries"></div>
      </div>
    </div>
    <script src="./assets/changelog.js"></script>
  </body>
</html>
